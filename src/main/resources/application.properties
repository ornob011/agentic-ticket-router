############################################
# APPLICATION CONFIG
############################################
spring.application.name=agentic-ticket-router-agent
server.port=8080

############################################
# DATABASE CONFIG (POSTGRESQL)
############################################
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/dsi_agentic_ticketing
spring.datasource.username=agentic_ticketing_app
spring.datasource.password=dev_strong_password_change_later

############################################
# CONNECTION POOL CONFIG (HIKARICP)
############################################
spring.datasource.hikari.pool-name=agenticTicketingPool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

############################################
# JPA / HIBERNATE CONFIG
############################################
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Dhaka
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.prefer_native_enum_types=true

############################################
# LOGGING CONFIG
############################################
logging.level.root=INFO
logging.level.com.dsi=DEBUG

logging.file.name=logs/agentic-ticket-router-agent.log
logging.pattern.file=%d{ISO8601} %-5level %logger{36}:%-4L - %msg%n

############################################
# DATABASE QUERY LOGGING (DEV ONLY)
############################################
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

