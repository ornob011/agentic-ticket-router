############################################
# APPLICATION CONFIG
############################################
spring.application.name=agentic-ticket-router-agent
server.port=8080

############################################
# DATABASE CONFIG (POSTGRESQL)
############################################
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/dsi_agentic_ticketing
spring.datasource.username=agentic_ticketing_app
spring.datasource.password=dev_strong_password_change_later

############################################
# CONNECTION POOL CONFIG (HIKARICP)
############################################
spring.datasource.hikari.pool-name=agenticTicketingPool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

############################################
# JPA / HIBERNATE CONFIG
############################################
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Dhaka
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.prefer_native_enum_types=false

############################################
# LOGGING CONFIG
############################################
logging.level.root=INFO
logging.level.com.dsi=DEBUG

logging.file.name=logs/agentic-ticket-router-agent.log
logging.pattern.file=%d{ISO8601} %-5level %logger{36}:%-4L - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId}] [%thread] %-5level %logger{36} - %msg%n

############################################
# DATABASE QUERY LOGGING (DEV ONLY)
############################################
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.jdbc.bind=ERROR

############################################
# SECURITY CONFIG
############################################
security.rememberme.key=K/qoZmlcskJA4t3DGmVy4PQyfQ9PbRCaG6ly9VM7N18jkMu9N24iCWeEgjTS7qJTamWpiZjRNJ2tG/ITaguZPg==
security.rememberme.token-validity-seconds=7200
security.password.secret=AOxpXxW1VaZgWR3s+SnIbBDN2gFmKmdL+qaw9s10TyF67G2UtT1UD3jmcMCNkHsT

############################################
# THYMELEAF CONFIG
############################################
spring.thymeleaf.cache=false


############################################
# Spring AI Ollama
############################################
spring.ai.ollama.base-url=http://localhost:11434

# Model + generation params
spring.ai.ollama.chat.options.model=qwen2.5:7b-instruct
spring.ai.ollama.chat.options.temperature=0.0
spring.ai.ollama.chat.options.num-predict=512

# Embedding Configuration
spring.ai.ollama.embedding.options.model=qwen3-embedding
spring.ai.model.embedding=ollama
spring.ai.ollama.init.pull-model-strategy=when_missing

# PgVectorStore Configuration
spring.ai.vectorstore.pgvector.initialize-schema=false
spring.ai.vectorstore.pgvector.index-type=IVFFlat
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=4096
spring.ai.vectorstore.pgvector.table-name=vector_store

############################################
# Resilience4j - CircuitBreaker
############################################
resilience4j.circuitbreaker.instances.ollamaCircuit.register-health-indicator=true

resilience4j.circuitbreaker.instances.ollamaCircuit.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.ollamaCircuit.sliding-window-size=10
resilience4j.circuitbreaker.instances.ollamaCircuit.minimum-number-of-calls=10

resilience4j.circuitbreaker.instances.ollamaCircuit.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ollamaCircuit.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.ollamaCircuit.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.ollamaCircuit.automatic-transition-from-open-to-half-open-enabled=true

############################################
# Resilience4j - Retry
############################################
resilience4j.retry.instances.ollamaRetry.max-attempts=3
resilience4j.retry.instances.ollamaRetry.wait-duration=1s
resilience4j.retry.instances.ollamaRetry.enable-exponential-backoff=true
resilience4j.retry.instances.ollamaRetry.exponential-backoff-multiplier=2

############################################
# Resilience4j - TimeLimiter (recommended for LLM calls)
############################################
resilience4j.timelimiter.instances.ollamaCircuit.timeout-duration=30s
resilience4j.timelimiter.instances.ollamaCircuit.cancel-running-future=true

############################################
# Async Thread Pool
############################################
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-
spring.task.execution.shutdown.await-termination=true
spring.task.execution.shutdown.await-termination-period=30s

############################################
# Jackson Config
############################################
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.indent-output=true
