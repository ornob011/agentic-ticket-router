<!doctype html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/common-layout}"
>
    <head>
        <title layout:fragment="title">Sign Up - SupportHub</title>
    </head>

    <body>
        <main layout:fragment="contentBody">
            <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-canvas">
                <div class="w-full max-w-2xl">
                    <div class="text-center mb-8">
                        <div
                            class="mx-auto w-14 h-14 rounded-xl bg-primary flex items-center justify-center shadow-md mb-5"
                        >
                            <div th:replace="~{fragments/icons :: logo}"></div>
                        </div>
                        <h1 class="text-2xl font-medium text-text-primary">Create your account</h1>
                        <p class="mt-2 text-text-muted">Join SupportHub to submit and track support tickets</p>
                    </div>

                    <div class="bg-surface border border-subtle rounded-xl shadow-sm p-6 sm:p-8">
                        <form th:action="@{/signup}" th:object="${signup}" method="post" class="space-y-6">
                            <div th:replace="~{fragments/form-errors :: globalErrors}"></div>

                            <div class="space-y-4">
                                <div
                                    th:replace="~{fragments/form-section :: header(
                                        step=1,
                                        title='Account Information'
                                    )}"
                                ></div>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div
                                        th:replace="~{fragments/form-fields :: input(
                                            field='username',
                                            label='Username',
                                            placeholder='rahimahmed'
                                        )}"
                                    ></div>
                                    <div
                                        th:replace="~{fragments/form-fields :: input(
                                            field='email',
                                            label='Email Address',
                                            placeholder='rahim.ahmed@company.com.bd',
                                            type='email'
                                        )}"
                                    ></div>
                                </div>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div
                                        th:replace="~{fragments/form-fields :: input(
                                            field='password',
                                            label='Password',
                                            placeholder='••••••••',
                                            type='password'
                                        )}"
                                    ></div>
                                    <div
                                        th:replace="~{fragments/form-fields :: input(
                                            field='confirmPassword',
                                            label='Confirm Password',
                                            placeholder='••••••••',
                                            type='password'
                                        )}"
                                    ></div>
                                </div>

                                <div
                                    th:replace="~{fragments/form-fields :: input(
                                        field='fullName',
                                        label='Full Name',
                                        placeholder='Rahim Ahmed'
                                    )}"
                                ></div>
                            </div>

                            <div class="space-y-4">
                                <div
                                    th:replace="~{fragments/form-section :: header(
                                        step=2,
                                        title='Profile Information'
                                    )}"
                                ></div>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div
                                        th:replace="~{fragments/form-fields :: input(
                                            field='companyName',
                                            label='Company Name',
                                            placeholder='Dhaka Tech Solutions Ltd.'
                                        )}"
                                    ></div>
                                    <div
                                        th:replace="~{fragments/form-fields :: input(
                                            field='phoneNumber',
                                            label='Phone Number',
                                            placeholder='+880 1712-345678',
                                            type='tel'
                                        )}"
                                    ></div>
                                </div>

                                <div
                                    th:replace="~{fragments/form-fields :: input(
                                        field='address',
                                        label='Street Address',
                                        placeholder='House 12, Road 5, Sector 10, Uttara'
                                    )}"
                                ></div>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div
                                        th:replace="~{fragments/form-fields :: input(
                                            field='city',
                                            label='City',
                                            placeholder='Dhaka'
                                        )}"
                                    ></div>

                                    <div
                                        th:replace="~{fragments/form-fields :: select(
                                            field='countryIso2',
                                            label='Country',
                                            placeholder='Select a country',
                                            options=${countries},
                                            itemValue='iso2',
                                            itemLabel='name',
                                            selectedValue='BD'
                                        )}"
                                    ></div>
                                </div>
                            </div>

                            <div class="space-y-4">
                                <div
                                    th:replace="~{fragments/form-section :: header(
                                        step=3,
                                        title='Preferences'
                                    )}"
                                ></div>

                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div
                                        th:replace="~{fragments/form-fields :: select(
                                            field='customerTierCode',
                                            label='Support Tier',
                                            placeholder='Select your tier',
                                            options=${tiers},
                                            itemValue='code',
                                            itemLabel='displayName'
                                        )}"
                                    ></div>

                                    <div
                                        th:replace="~{fragments/form-fields :: select(
                                            field='preferredLanguageCode',
                                            label='Preferred Language',
                                            placeholder='Select a language',
                                            options=${languages},
                                            itemValue='code',
                                            itemLabel='name',
                                            selectedValue='en'
                                        )}"
                                    ></div>
                                </div>
                            </div>

                            <div class="pt-4 space-y-4 border-t border-subtle">
                                <p class="text-sm text-text-muted text-center">
                                    By creating an account, you agree to our
                                    <a href="#" class="text-primary hover:text-primary-hover hover:underline"
                                        >Terms of Service</a
                                    >
                                    and
                                    <a href="#" class="text-primary hover:text-primary-hover hover:underline"
                                        >Privacy Policy</a>
                                    >.
                                </p>

                                <button
                                    type="submit"
                                    class="w-full py-2.5 px-6 text-sm font-medium text-white bg-primary hover:bg-primary-hover rounded-lg shadow-sm transition-all duration-200"
                                >
                                    Create Account
                                </button>
                            </div>
                        </form>
                    </div>

                    <p class="mt-6 text-center text-text-muted">
                        Already have an account?
                        <a
                            th:href="@{/login}"
                            class="text-primary hover:text-primary-hover font-medium hover:underline transition-colors duration-200"
                        >
                            Sign in
                        </a>
                    </p>
                </div>
            </div>
        </main>
    </body>
</html>
