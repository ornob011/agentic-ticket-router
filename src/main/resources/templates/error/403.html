<!DOCTYPE html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/common-layout}"
>
<head>
    <title layout:fragment="title">403 Access Denied - SupportHub</title>
</head>

<body>
<main layout:fragment="contentBody">
    <div class="w-full px-4 sm:px-6 lg:px-8 py-22">
        <section
            class="mx-auto max-w-xl rounded-2xl bg-white shadow-lg ring-1 ring-black/5 p-6 sm:p-10 text-center"
            aria-label="Error 403"
        >
            <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-amber-50 ring-1 ring-amber-100">
                <svg class="h-7 w-7 text-amber-600" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>

            <p class="text-xs font-semibold tracking-widest text-amber-600">ERROR 403</p>
            <h1 class="mt-6 text-2xl sm:text-3xl font-bold text-gray-900">Access Denied</h1>

            <p class="mt-3 text-sm sm:text-base text-gray-600 leading-relaxed force-visible">
                You don’t have permission to view this page. If you think this is a mistake, contact your administrator.
            </p>

            <div class="mt-8 flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-3">
                <a
                    th:href="@{/}"
                    class="inline-flex items-center justify-center rounded-lg bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm
                           hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition"
                >
                    Back to Home
                </a>

                <button
                    type="button"
                    onclick="window.history.back()"
                    class="inline-flex items-center justify-center rounded-lg bg-gray-100 px-5 py-2.5 text-sm font-semibold text-gray-800
                           hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-2 transition"
                >
                    Go Back
                </button>
            </div>

            <div class="mt-8 border-t border-gray-100 pt-5 text-xs text-gray-500">
                Tip: If you recently changed roles/permissions, try signing out and back in to refresh your access.
            </div>
        </section>
    </div>
</main>
</body>
</html>
