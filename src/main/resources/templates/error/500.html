<!DOCTYPE html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/common-layout}"
>
<head>
    <title layout:fragment="title">500 Internal Server Error - SupportHub</title>
</head>

<body>
    <main layout:fragment="contentBody">
        <div class="w-full px-4 sm:px-6 lg:px-8
              min-h-screen supports-[height:100dvh]:min-h-[100dvh]
              flex justify-center items-start sm:items-center
              py-10 sm:py-16">
        <section
            class="mx-auto max-w-xl rounded-2xl bg-surface shadow-lg border border-subtle p-6 sm:p-10 text-center"
            aria-label="Error 500"
        >
            <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-error-light border border-subtle">
                <svg class="h-7 w-7 text-error" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                </svg>
            </div>

            <p class="text-xs font-semibold uppercase tracking-widest text-error">ERROR 500</p>
            <h1 class="mt-6 text-2xl sm:text-3xl font-medium text-text-primary">Internal Server Error</h1>

            <p class="mt-3 text-sm sm:text-base text-text-muted leading-relaxed force-visible">
                Something broke on our side. Please try again. If this keeps happening, contact support.
            </p>

            <div class="mt-8 flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-3">
                <a
                    th:href="@{/}"
                    class="inline-flex items-center justify-center rounded-lg bg-primary px-5 py-2.5 text-sm font-medium text-white shadow-sm
                           hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-info focus:ring-offset-2 transition"
                >
                    Back to Home
                </a>

                <button
                    type="button"
                    onclick="window.location.reload()"
                    class="inline-flex items-center justify-center rounded-lg bg-surface-alt px-5 py-2.5 text-sm font-medium text-text-secondary
                           hover:bg-surface focus:outline-none focus:ring-2 focus:ring-info focus:ring-offset-2 transition"
                >
                    Reload
                </button>
            </div>

            <div class="mt-8 border-t border-subtle pt-5 text-xs text-text-subtle">
                Tip: If this happened right after an action, it may have partially succeeded—check your recent changes.
            </div>
        </section>
    </div>
</main>
</body>
</html>
