<!DOCTYPE html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/common-layout}"
>
<head>
    <title layout:fragment="title">404 Page Not Found - SupportHub</title>
</head>

<body>
<main layout:fragment="contentBody">
    <div class="w-full px-4 sm:px-6 lg:px-8 py-22">
        <section
            class="mx-auto max-w-xl rounded-2xl bg-white shadow-lg ring-1 ring-black/5 p-6 sm:p-10 text-center"
            aria-label="Error 404"
        >
            <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-50 ring-1 ring-blue-100">
                <svg class="h-7 w-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                </svg>
            </div>

            <p class="text-xs font-semibold tracking-widest text-blue-600">ERROR 404</p>
            <h1 class="mt-6 text-2xl sm:text-3xl font-bold text-gray-900">Page Not Found</h1>

            <p class="mt-3 text-sm sm:text-base text-gray-600 leading-relaxed force-visible">
                We couldn’t find the page you’re looking for. It may have been moved, renamed, or deleted.
            </p>

            <div class="mt-8 flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-3">
                <a
                    th:href="@{/}"
                    class="inline-flex items-center justify-center rounded-lg bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm
                           hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition"
                >
                    Back to Home
                </a>

                <button
                    type="button"
                    onclick="window.history.back()"
                    class="inline-flex items-center justify-center rounded-lg bg-gray-100 px-5 py-2.5 text-sm font-semibold text-gray-800
                           hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-2 transition"
                >
                    Go Back
                </button>
            </div>

            <div class="mt-8 border-t border-gray-100 pt-5 text-xs text-gray-500">
                Tip: Check the URL for typos, or navigate from the homepage to find the updated path.
            </div>
        </section>
    </div>
</main>
</body>
</html>
