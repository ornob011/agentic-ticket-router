<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
    <div
        th:fragment="loading-overlay"
        id="loading-overlay"
        class="fixed inset-0 z-50 bg-surface/80 backdrop-blur-sm items-center justify-center hidden"
        aria-hidden="true"
        role="status"
        aria-label="Loading"
    >
        <div class="flex flex-col items-center gap-3">
            <div class="relative">
                <div class="w-10 h-10 rounded-full border-2 border-subtle"></div>
                <div
                    class="absolute inset-0 w-10 h-10 rounded-full border-2 border-primary border-t-transparent animate-spin"
                ></div>
            </div>
            <p class="text-text-muted text-sm font-medium">Loading...</p>
        </div>
    </div>
</html>
