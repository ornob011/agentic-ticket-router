<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
    <footer th:fragment="footer" class="border-t border-subtle bg-surface mt-auto print:hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <!-- Brand -->
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center" aria-hidden="true">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"
                            />
                        </svg>
                    </div>
                    <span class="text-text-muted text-sm">
                        SupportHub &copy; <span th:text="${#temporals.year(#temporals.createNow())}">2025</span>. All
                        rights reserved.
                    </span>
                </div>

                <!-- Links -->
                <nav class="flex items-center gap-4 sm:gap-6" aria-label="Footer navigation">
                    <a th:href="@{/help}" class="text-sm text-text-muted hover:text-text-secondary transition-colors"
                        >Help Center</a
                    >
                    <a th:href="@{/api-docs}" class="text-sm text-text-muted hover:text-text-secondary transition-colors"
                        >API Docs</a
                    >
                    <a th:href="@{/status}" class="text-sm text-text-muted hover:text-text-secondary transition-colors"
                        >Status</a
                    >
                    <a th:href="@{/privacy}" class="text-sm text-text-muted hover:text-text-secondary transition-colors"
                        >Privacy</a
                    >
                </nav>
            </div>
        </div>
    </footer>
</html>
