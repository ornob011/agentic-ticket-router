<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="auditEventBubble"
     th:with="
        eventTypeLabel=${auditEvent.eventType.name()},
        eventTypeDescription=${auditEvent.eventType.description},
        actorRole=${auditEvent.payload != null && auditEvent.payload.has('actorRole') ? auditEvent.payload.get('actorRole').asText() : (auditEvent.payload != null && auditEvent.payload.has('agentRole') ? auditEvent.payload.get('agentRole').asText() : null)},
        action=${auditEvent.payload != null && auditEvent.payload.has('action') ? auditEvent.payload.get('action').asText() : null}
     ">
    <div class="flex py-6 justify-center">
        <div class="w-full max-w-2xl">
            <div class="rounded-2xl shadow-sm overflow-hidden bg-info-light border border-info">
                <div class="px-5 py-4 border-b border-info-light">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-white font-bold text-sm bg-info">
                                <i class="fas fa-shield-halved"></i>
                            </div>

                            <div class="min-w-0">
                                <div class="flex flex-wrap items-center gap-2">
                                    <p class="font-semibold text-info-dark">System Update</p>

                                    <span class="px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide rounded-full bg-white border border-info-light text-info"
                                          th:text="${eventTypeLabel}">
                                        Event Type
                                    </span>
                                </div>

                                <div class="mt-1 flex items-center gap-2 text-xs text-info-dark">
                                    <i class="far fa-clock text-info-dark"></i>
                                    <span th:text="${#temporals.format(auditEvent.createdAt, 'yyyy-MM-dd HH:mm')}">Time</span>
                                </div>
                            </div>
                        </div>

                        <div class="shrink-0 text-info-dark">
                            <i class="fas fa-info-circle"></i>
                        </div>
                    </div>
                </div>

                <div class="px-5 py-5">
                    <div class="text-info-dark leading-relaxed" th:text="${auditEvent.description}">
                        Event description...
                    </div>
                    
                    <div th:if="${actorRole != null && action == null}" class="mt-3 text-sm">
                        <span class="px-3 py-1.5 rounded-xl bg-white border border-info-light text-info font-medium">
                            By <span th:text="${actorRole}">AGENT</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
