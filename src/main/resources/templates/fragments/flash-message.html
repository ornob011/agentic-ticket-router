<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
    <div
        th:fragment="flash-message-block"
        id="flash-message-block"
        class="fixed top-16 right-4 w-full max-w-sm sm:max-w-md z-40 space-y-2 pointer-events-none"
    >
        <!-- Success Message -->
        <th:block th:if="${session.flushSuccessMessage != null}">
            <div
                class="flash-message pointer-events-auto flex items-center justify-between gap-3 px-4 py-3 rounded-lg border border-success-light bg-success-lightest text-success-dark shadow-lg"
                role="alert"
                aria-live="polite"
            >
                <div class="flex items-center gap-3 min-w-0">
                    <i class="fa fa-circle-check text-success text-lg flex-shrink-0" aria-hidden="true"></i>
                    <p class="text-sm font-medium truncate" th:text="${session.flushSuccessMessage}">Success message</p>
                </div>
                <button
                    type="button"
                    class="js-flash-dismiss flex-shrink-0 p-1 text-success hover:text-success-dark hover:bg-success-light rounded transition-colors"
                    aria-label="Dismiss message"
                >
                    <i class="fa fa-xmark text-lg" aria-hidden="true"></i>
                </button>
            </div>
        </th:block>

        <!-- Error Message -->
        <th:block th:if="${session.flushErrorMessage != null}">
            <div
                class="flash-message pointer-events-auto flex items-center justify-between gap-3 px-4 py-3 rounded-lg border border-error-light bg-error-lightest text-error-dark shadow-lg"
                role="alert"
                aria-live="assertive"
            >
                <div class="flex items-center gap-3 min-w-0">
                    <i class="fa fa-triangle-exclamation text-error text-lg flex-shrink-0" aria-hidden="true"></i>
                    <p class="text-sm font-medium truncate" th:text="${session.flushErrorMessage}">Error message</p>
                </div>
                <button
                    type="button"
                    class="js-flash-dismiss flex-shrink-0 p-1 text-error hover:text-error-dark hover:bg-error-light rounded transition-colors"
                    aria-label="Dismiss message"
                >
                    <i class="fa fa-xmark text-lg" aria-hidden="true"></i>
                </button>
            </div>
        </th:block>

        <!-- Warning Message -->
        <th:block th:if="${session.flushWarningMessage != null}">
            <div
                class="flash-message pointer-events-auto flex items-center justify-between gap-3 px-4 py-3 rounded-lg border border-warning-light bg-warning-lightest text-warning-dark shadow-lg"
                role="alert"
                aria-live="polite"
            >
                <div class="flex items-center gap-3 min-w-0">
                    <i class="fa fa-triangle-exclamation text-warning text-lg flex-shrink-0" aria-hidden="true"></i>
                    <p class="text-sm font-medium truncate" th:text="${session.flushWarningMessage}">Warning message</p>
                </div>
                <button
                    type="button"
                    class="js-flash-dismiss flex-shrink-0 p-1 text-warning hover:text-warning-dark hover:bg-warning-light rounded transition-colors"
                    aria-label="Dismiss message"
                >
                    <i class="fa fa-xmark text-lg" aria-hidden="true"></i>
                </button>
            </div>
        </th:block>

        <!-- Info Message -->
        <th:block th:if="${session.flushInfoMessage != null}">
            <div
                class="flash-message pointer-events-auto flex items-center justify-between gap-3 px-4 py-3 rounded-lg border border-info-light bg-info-lightest text-info-dark shadow-lg"
                role="alert"
                aria-live="polite"
            >
                <div class="flex items-center gap-3 min-w-0">
                    <i class="fa fa-circle-info text-info text-lg flex-shrink-0" aria-hidden="true"></i>
                    <p class="text-sm font-medium truncate" th:text="${session.flushInfoMessage}">Info message</p>
                </div>
                <button
                    type="button"
                    class="js-flash-dismiss flex-shrink-0 p-1 text-info hover:text-info-dark hover:bg-info-light rounded transition-colors"
                    aria-label="Dismiss message"
                >
                    <i class="fa fa-xmark text-lg" aria-hidden="true"></i>
                </button>
            </div>
        </th:block>

        <!-- Clear session messages after rendering -->
        <th:block th:text="${@sessionService.removeFlushMessageFromSession()}" th:remove="all"></th:block>
    </div>
</html>
