<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <body>
        <div th:fragment="input(field, label, placeholder)" th:with="type=${type} ?: 'text'">
            <label th:for="${field}" class="block text-sm font-medium text-gray-700 mb-1.5">
                [[${label}]] <span class="text-red-500">*</span>
            </label>

            <input
                th:type="${type}"
                th:id="${field}"
                th:field="*{__${field}__}"
                class="w-full px-3 py-2 bg-white border rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 transition-colors duration-200"
                th:classappend="${#fields.hasErrors('__${field}__')} ? 'border-red-300 focus:ring-red-500 focus:border-red-500' : 'border-gray-300 focus:ring-blue-500 focus:border-blue-500'"
                th:placeholder="${placeholder}"
            />

            <p
                th:if="${#fields.hasErrors('__${field}__')}"
                th:errors="*{__${field}__}"
                class="mt-1.5 text-sm text-red-600"
            ></p>

            <div
                th:if="${type == 'password' and field == 'password'}"
                th:unless="${#fields.hasErrors('__${field}__')}"
                class="mt-1.5 text-xs text-gray-500"
            >
                Min 8 characters with letters and numbers
            </div>
        </div>

        <div th:fragment="select">
            <div th:remove="tag"
                 th:with="passedValue=*{__${field}__},
                  defaultValue=${selectedValue} ?: null,
                  targetValue=${!#strings.isEmpty(passedValue) ? passedValue : defaultValue}">

                <label th:for="${field}" class="block text-sm font-medium text-gray-700 mb-1.5">
                    [[${label}]] <span class="text-red-500">*</span>
                </label>

                <select
                    th:id="${field}"
                    th:name="${field}"
                    class="w-full px-3 py-2 bg-white border rounded-lg text-gray-900 focus:outline-none focus:ring-2 transition-colors duration-200 cursor-pointer"
                    th:classappend="${#fields.hasErrors('__${field}__')} ? 'border-red-300 focus:ring-red-500 focus:border-red-500' : 'border-gray-300 focus:ring-blue-500 focus:border-blue-500'"
                >
                    <option value="" disabled selected class="text-gray-400" th:text="${placeholder}">Select...</option>

                    <option
                        th:each="opt : ${options}"
                        th:with="optValue=${opt['__${itemValue}__']}"
                        th:value="${optValue}"
                        th:text="${opt['__${itemLabel}__']}"
                        th:selected="${#strings.toString(optValue) == #strings.toString(targetValue)}"
                    ></option>
                </select>

                <p
                    th:if="${#fields.hasErrors('__${field}__')}"
                    th:errors="*{__${field}__}"
                    class="mt-1.5 text-sm text-red-600"
                ></p>
            </div>
        </div>
    </body>
</html>
