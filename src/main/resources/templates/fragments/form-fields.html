<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="input(field, label, placeholder)" th:with="type=${type} ?: 'text'">
    <label th:for="${field}" class="block text-xs font-semibold uppercase tracking-widest text-text-muted mb-2">
        [[${label}]] <span class="text-error">*</span>
    </label>

    <div class="relative">
        <input
            th:type="${type}"
            th:id="${field}"
            th:field="*{__${field}__}"
            class="block w-full rounded-lg px-4 py-3 bg-surface-alt text-text-primary placeholder:text-text-subtle focus:bg-surface focus:outline-none focus:ring-2 focus:ring-info focus:ring-offset-2 transition-all"
            th:classappend="${#fields.hasErrors('__${field}__')} ? 'ring-2 ring-error ring-offset-2' : ''"
            th:placeholder="${placeholder}"
        />
    </div>

    <p
        th:if="${#fields.hasErrors('__${field}__')}"
        th:errors="*{__${field}__}"
        class="mt-1.5 text-sm text-error"
    ></p>

    <div
        th:if="${type == 'password' and field == 'password'}"
        th:unless="${#fields.hasErrors('__${field}__')}"
        class="mt-1.5 text-xs text-text-muted"
    >
        Min 8 characters with letters and numbers
    </div>
</div>

<div th:fragment="textarea(field, label, placeholder, rows)"
     th:with="rowCount=${rows} ?: '6'">
    <label th:for="${field}" class="block text-xs font-semibold uppercase tracking-widest text-text-muted mb-2">
        [[${label}]] <span class="text-error">*</span>
    </label>

    <textarea
        th:id="${field}"
        th:field="*{__${field}__}"
        th:rows="${rowCount}"
        class="w-full rounded-lg px-4 py-3 bg-surface-alt text-text-primary placeholder:text-text-subtle focus:bg-surface focus:outline-none focus:ring-2 focus:ring-info focus:ring-offset-2 transition-all resize-y"
        th:classappend="${#fields.hasErrors('__${field}__')} ? 'ring-2 ring-error ring-offset-2' : ''"
        th:placeholder="${placeholder}"
    ></textarea>

    <p
        th:if="${#fields.hasErrors('__${field}__')}"
        th:errors="*{__${field}__}"
        class="mt-1.5 text-sm text-error"
    ></p>
</div>

<div th:fragment="select">
    <div th:remove="tag"
         th:with="passedValue=*{__${field}__},
                  defaultValue=${selectedValue} ?: null,
                  targetValue=${!#strings.isEmpty(passedValue) ? passedValue : defaultValue}">

        <label th:for="${field}" class="block text-xs font-semibold uppercase tracking-widest text-text-muted mb-2">
            [[${label}]] <span class="text-error">*</span>
        </label>

        <select
            th:id="${field}"
            th:name="${field}"
            class="w-full rounded-lg px-4 py-3 bg-surface-alt text-text-primary focus:bg-surface focus:outline-none focus:ring-2 focus:ring-info focus:ring-offset-2 transition-all cursor-pointer"
            th:classappend="${#fields.hasErrors('__${field}__')} ? 'ring-2 ring-error ring-offset-2' : ''"
        >
            <option value="" disabled selected class="text-text-subtle" th:text="${placeholder}">Select...</option>

            <option
                th:each="opt : ${options}"
                th:with="optValue=${opt['__${itemValue}__']}"
                th:value="${optValue}"
                th:text="${opt['__${itemLabel}__']}"
                th:selected="${#strings.toString(optValue) == #strings.toString(targetValue)}"
            ></option>
        </select>

        <p
            th:if="${#fields.hasErrors('__${field}__')}"
            th:errors="*{__${field}__}"
            class="mt-1.5 text-sm text-error"
        ></p>
    </div>
</div>
</body>
</html>
