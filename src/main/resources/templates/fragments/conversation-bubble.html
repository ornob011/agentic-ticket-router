<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="conversationBubble"
     th:with="
         bgClass=${systemGenerated ? 'bg-info-light' : 'bg-surface-alt'},
         alignClass=${systemGenerated ? 'justify-center' : (fromCustomer ? 'justify-start' : 'justify-end')},
         accentClass=${systemGenerated ? 'border border-info' : (fromCustomer ? 'border-l-4 border-primary border border-subtle' : 'border-r-4 border-success border border-subtle')},
         bubbleClass=${bgClass + ' ' + accentClass},
         avatarClass=${fromCustomer ? 'bg-primary' : (systemGenerated ? 'bg-indigo-500' : 'bg-success')},
         roleLabel=${systemGenerated ? 'System' : (fromCustomer ? 'Customer' : 'Agent')}
      ">

    <div class="flex py-6" th:classappend="${alignClass}">
        <div class="w-full"
             th:classappend="${systemGenerated ? 'max-w-2xl' : 'max-w-3xl'}">

            <!-- Bubble -->
            <div class="rounded-2xl shadow-sm overflow-hidden"
                 th:classappend="${bubbleClass}">

                <!-- Header -->
                <div class="px-5 py-4 border-b border-subtle">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-white font-bold text-sm"
                                 th:classappend="${avatarClass}">
                                <span th:if="${author != null}"
                                      th:text="${#strings.toUpperCase(#strings.substring(author.fullName, 0, 1))}">A</span>
                                <i th:if="${author == null}" class="fas fa-robot"></i>
                            </div>

                            <div class="min-w-0">
                                <div class="flex flex-wrap items-center gap-2">
                                    <p class="font-semibold text-text-primary truncate"
                                       th:text="${authorFullName != null ? authorFullName : 'System'}">
                                        Author
                                    </p>

                                    <span class="px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide rounded-full bg-surface border border-subtle text-text-muted"
                                          th:text="${roleLabel}">
                                        Role
                                    </span>

                                    <span th:if="${messageKind != null}"
                                          class="px-2 py-0.5 text-xs font-semibold rounded-full bg-surface border border-subtle text-text-secondary"
                                          th:text="${messageKind.description}">
                                        Kind
                                    </span>
                                </div>

                                <div class="mt-1 flex items-center gap-2 text-xs text-text-muted">
                                    <i class="far fa-clock text-text-subtle"></i>
                                    <span th:text="${createdAt}">Time</span>
                                </div>
                            </div>
                        </div>

                        <!-- Lightweight “meta” icon -->
                        <div class="shrink-0 text-text-subtle">
                            <i th:if="${systemGenerated}" class="fas fa-info-circle"></i>
                            <i th:if="${!systemGenerated}" class="far fa-comment-dots"></i>
                        </div>
                    </div>
                </div>

                <!-- Content -->
                <div class="px-5 py-5">
                    <div class="text-text-primary whitespace-pre-wrap leading-relaxed"
                         th:text="${content}">
                        Message content...
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
