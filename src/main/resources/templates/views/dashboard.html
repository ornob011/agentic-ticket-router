<!doctype html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="~{layouts/common-layout}"
>
    <head>
        <title>Dashboard | SupportHub</title>
    </head>

    <body>
        <div layout:fragment="contentBody" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-10">
            <!-- Welcome Section -->
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">
                        Welcome back,
                        <span class="text-blue-600" th:text="${dashboard.user.fullName ?: dashboard.user.username}"
                            >User</span
                        >!
                    </h1>
                    <p class="text-gray-500 text-sm mt-1">Here's what's happening with your tickets today.</p>
                </div>
                <div class="flex items-center gap-3">
                    <button
                        onclick="window.location.reload()"
                        class="p-2.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-xl transition-all"
                    >
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <a
                        sec:authorize="hasRole('CUSTOMER')"
                        th:href="@{/customer/tickets/new}"
                        class="inline-flex items-center px-5 py-2.5 bg-gray-900 hover:bg-black text-white text-sm font-semibold rounded-xl shadow-sm transition-all"
                    >
                        <i class="fas fa-plus mr-2 text-[10px]"></i> New Ticket
                    </a>
                </div>
            </div>

            <!-- CUSTOMER VIEW -->
            <div
                sec:authorize="hasRole('CUSTOMER')"
                th:if="${dashboard.customerData != null}"
                class="space-y-10"
                id="customer-dashboard-section"
                th:hx-get="@{'/dashboard/' + ${dashboard.user.id}}"
                hx-trigger="every 30s"
                hx-select="#customer-dashboard-section"
                hx-swap="outerHTML"
            >
                <!-- Stats Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div
                        th:replace="~{fragments/dashboard-cards :: stat-card(title='Open Tickets', value=${dashboard.customerData.openTickets}, icon='folder-open', color='blue')}"
                    ></div>
                    <div
                        th:replace="~{fragments/dashboard-cards :: stat-card(title='Waiting on Me', value=${dashboard.customerData.waitingOnMe}, icon='clock', color='amber')}"
                    ></div>
                    <div
                        th:replace="~{fragments/dashboard-cards :: stat-card(title='Resolved', value=${dashboard.customerData.resolvedTickets}, icon='check-circle', color='green')}"
                    ></div>
                    <div
                        th:replace="~{fragments/dashboard-cards :: stat-card(title='Closed', value=${dashboard.customerData.closedTickets}, icon='archive', color='gray')}"
                    ></div>
                </div>

                <!-- Recent Tickets -->
                <div
                    th:replace="~{fragments/dashboard-cards :: ticket-list-card(title='Recent Tickets', tickets=${dashboard.customerData.recentTickets}, viewAllUrl='/customer/tickets')}"
                ></div>
            </div>

            <!-- AGENT VIEW -->
            <div
                sec:authorize="hasAnyRole('AGENT', 'SUPERVISOR', 'ADMIN')"
                th:if="${dashboard.agentData != null}"
                class="space-y-10"
                id="agent-dashboard-section"
                th:hx-get="@{'/dashboard/' + ${dashboard.user.id}}"
                hx-trigger="every 30s"
                hx-select="#agent-dashboard-section"
                hx-swap="outerHTML"
            >
                <!-- Agent Stats Grid -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div
                        th:replace="~{fragments/dashboard-cards :: stat-card(title='Assigned to Me', value=${dashboard.agentData.myAssignedCount}, icon='user-tag', color='indigo')}"
                    ></div>
                    <!-- Additional agent metrics can go here -->
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Queue Distribution -->
                    <div class="lg:col-span-1">
                        <div
                            th:replace="~{fragments/dashboard-cards :: queue-summary(queueCounts=${dashboard.agentData.queueCounts})}"
                        ></div>
                    </div>
                    <!-- My Tickets List -->
                    <div class="lg:col-span-2">
                        <div
                            th:replace="~{fragments/dashboard-cards :: ticket-list-card(title='My Assigned Tickets', tickets=${dashboard.agentData.myTickets}, viewAllUrl='/agent/tickets')}"
                        ></div>
                    </div>
                </div>
            </div>

            <!-- SUPERVISOR EXTRA VIEW -->
            <div
                sec:authorize="hasAnyRole('SUPERVISOR', 'ADMIN')"
                th:if="${dashboard.supervisorData != null}"
                class="space-y-10"
                id="supervisor-dashboard-section"
                th:hx-get="@{'/dashboard/' + ${dashboard.user.id}}"
                hx-trigger="every 30s"
                hx-select="#supervisor-dashboard-section"
                hx-swap="outerHTML"
            >
                <div class="border-t border-gray-100 pt-10 mt-6">
                    <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                        <span class="w-10 h-10 bg-amber-50 flex items-center justify-center rounded-xl text-amber-600">
                            <i class="fas fa-shield-alt text-base"></i>
                        </span>
                        Supervisor Overview
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div
                            th:replace="~{fragments/dashboard-cards :: stat-card(title='Pending Escalations', value=${dashboard.supervisorData.pendingEscalations}, icon='exclamation-triangle', color='red')}"
                        ></div>
                        <div
                            th:replace="~{fragments/dashboard-cards :: stat-card(title='SLA Breaches (24h)', value=${dashboard.supervisorData.slaBreaches}, icon='stopwatch', color='orange')}"
                        ></div>
                        <div
                            th:replace="~{fragments/dashboard-cards :: stat-card(title='Human Review Queue', value=${dashboard.supervisorData.humanReviewCount}, icon='user-check', color='purple')}"
                        ></div>
                    </div>

                    <!-- Escalations Table could go here -->
                </div>
            </div>

            <!-- ADMIN EXTRA VIEW -->
            <div sec:authorize="hasRole('ADMIN')" th:if="${dashboard.adminData != null}" class="space-y-10">
                <div class="border-t border-gray-100 pt-10 mt-6">
                    <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                        <span
                            class="w-10 h-10 bg-purple-50 flex items-center justify-center rounded-xl text-purple-600"
                        >
                            <i class="fas fa-cogs text-base"></i>
                        </span>
                        System Administration
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div
                            th:replace="~{fragments/dashboard-cards :: stat-card(title='Total Users', value=${dashboard.adminData.totalUsers}, icon='users', color='cyan')}"
                        ></div>
                        <div
                            th:replace="~{fragments/dashboard-cards :: stat-card(title='Total Tickets', value=${dashboard.adminData.totalTickets}, icon='ticket-alt', color='teal')}"
                        ></div>
                        <!-- Routing Success Rate formatted as percentage -->
                        <div class="bg-white rounded-2xl p-6 shadow-sm hover:shadow-md transition-all duration-300">
                            <div class="flex items-start justify-between gap-4">
                                <div class="flex-1 min-w-0">
                                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">
                                        Routing Success
                                    </p>
                                    <h3
                                        class="text-2xl font-semibold text-gray-800"
                                        th:text="${#numbers.formatPercent(dashboard.adminData.routingSuccessRate, 1, 1)}"
                                    >
                                        98%
                                    </h3>
                                </div>
                                <div
                                    class="w-12 h-12 flex items-center justify-center rounded-xl bg-green-50 text-green-500 flex-shrink-0"
                                >
                                    <i class="fas fa-robot text-lg"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
