<!doctype html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="~{layouts/common-layout}"
>
<head>
    <title>Dashboard | SupportHub</title>
</head>

<body>
<div layout:fragment="contentBody" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-10">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
            <h1 class="text-2xl font-medium text-text-primary tracking-tight">
                Welcome back,
                <span class="text-primary" th:text="${dashboard.user.fullName ?: dashboard.user.username}"
                >User</span>
            </h1>
            <p class="text-text-muted text-sm mt-1">Here's what's happening with your tickets today.</p>
        </div>
        <div class="flex items-center gap-3">
            <button
                onclick="window.location.reload()"
                class="p-2.5 text-text-muted hover:text-text-primary hover:bg-surface-alt rounded-lg transition-all"
            >
                <i class="fas fa-sync-alt"></i>
            </button>
            <a
                sec:authorize="hasRole('CUSTOMER')"
                th:href="@{/tickets/create/new}"
                class="inline-flex items-center px-5 py-2.5 bg-primary hover:bg-primary-hover text-white text-sm font-semibold rounded-lg transition-all"
            >
                <i class="fas fa-plus mr-2 text-xs"></i>
                New Ticket
            </a>
        </div>
    </div>

    <div
        sec:authorize="hasRole('CUSTOMER')"
        th:if="${dashboard.customerData != null}"
        class="space-y-10"
        id="customer-dashboard-section"
        th:hx-get="@{'/dashboard'}"
        hx-trigger="every 30s"
        hx-select="#customer-dashboard-section"
        hx-swap="outerHTML"
    >
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div
                th:replace="~{fragments/dashboard-cards :: stat-card(title='Open Tickets', value=${dashboard.customerData.openTickets}, icon='folder-open')}"
            ></div>
            <div
                th:replace="~{fragments/dashboard-cards :: stat-card(title='Waiting on Me', value=${dashboard.customerData.waitingOnMe}, icon='clock')}"
            ></div>
            <div
                th:replace="~{fragments/dashboard-cards :: stat-card(title='Resolved', value=${dashboard.customerData.resolvedTickets}, icon='check-circle')}"
            ></div>
            <div
                th:replace="~{fragments/dashboard-cards :: stat-card(title='Closed', value=${dashboard.customerData.closedTickets}, icon='archive')}"
            ></div>
        </div>

        <div
            th:replace="~{fragments/dashboard-cards :: ticket-list-card(title='Recent Tickets', tickets=${dashboard.customerData.recentTickets}, viewAllUrl='/tickets')}"
        ></div>
    </div>

    <div
        sec:authorize="hasAnyRole('AGENT', 'SUPERVISOR', 'ADMIN')"
        th:if="${dashboard.agentData != null}"
        class="space-y-10"
        id="agent-dashboard-section"
        th:hx-get="@{'/dashboard'}"
        hx-trigger="every 30s"
        hx-select="#agent-dashboard-section"
        hx-swap="outerHTML"
    >
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div
                th:replace="~{fragments/dashboard-cards :: stat-card(title='Assigned to Me', value=${dashboard.agentData.myAssignedCount}, icon='user-tag')}"
            ></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div
                    th:replace="~{fragments/dashboard-cards :: queue-summary(queueCounts=${dashboard.agentData.queueCounts})"
                ></div>
            </div>
            <div class="lg:col-span-2">
                <div
                    th:replace="~{fragments/dashboard-cards :: ticket-list-card(title='My Assigned Tickets', tickets=${dashboard.agentData.myTickets}, viewAllUrl='/agent/tickets')}"
                ></div>
            </div>
        </div>
    </div>

    <div
        sec:authorize="hasAnyRole('SUPERVISOR', 'ADMIN')"
        th:if="${dashboard.supervisorData != null}"
        class="space-y-10"
        id="supervisor-dashboard-section"
        th:hx-get="@{'/dashboard'}"
        hx-trigger="every 30s"
        hx-select="#supervisor-dashboard-section"
        hx-swap="outerHTML"
    >
        <div class="border-t border-subtle pt-10 mt-6">
            <h2 class="text-xl font-medium text-text-primary mb-6 flex items-center gap-2">
                        <span class="w-10 h-10 bg-surface-alt flex items-center justify-center rounded-lg text-text-secondary">
                            <i class="fas fa-shield-alt text-base"></i>
                        </span>
                Supervisor Overview
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div
                    th:replace="~{fragments/dashboard-cards :: stat-card(title='Pending Escalations', value=${dashboard.supervisorData.pendingEscalations}, icon='exclamation-triangle')}"
                ></div>
                <div
                    th:replace="~{fragments/dashboard-cards :: stat-card(title='SLA Breaches (24h)', value=${dashboard.supervisorData.slaBreaches}, icon='stopwatch')}"
                ></div>
                <div
                    th:replace="~{fragments/dashboard-cards :: stat-card(title='Human Review Queue', value=${dashboard.supervisorData.humanReviewCount}, icon='user-check')}"
                ></div>
            </div>
        </div>
    </div>

    <div sec:authorize="hasRole('ADMIN')" th:if="${dashboard.adminData != null}" class="space-y-10">
        <div class="border-t border-subtle pt-10 mt-6">
            <h2 class="text-xl font-medium text-text-primary mb-6 flex items-center gap-2">
                        <span class="w-10 h-10 bg-surface-alt flex items-center justify-center rounded-lg text-text-secondary">
                            <i class="fas fa-cogs text-base"></i>
                        </span>
                System Administration
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-surface border border-subtle rounded-lg p-6">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-semibold uppercase tracking-widest text-text-muted mb-2">
                                Total Users
                            </p>
                            <h3
                                class="text-2xl font-medium text-text-primary"
                                th:text="${dashboard.adminData.totalUsers}"
                            >
                                100
                            </h3>
                        </div>
                        <div
                            class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-alt text-text-secondary flex-shrink-0"
                        >
                            <i class="fas fa-users text-lg"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-surface border border-subtle rounded-lg p-6">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-semibold uppercase tracking-widest text-text-muted mb-2">
                                Total Tickets
                            </p>
                            <h3
                                class="text-2xl font-medium text-text-primary"
                                th:text="${dashboard.adminData.totalTickets}"
                            >
                                1,250
                            </h3>
                        </div>
                        <div
                            class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-alt text-text-secondary flex-shrink-0"
                        >
                            <i class="fas fa-ticket-alt text-lg"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-surface border border-subtle rounded-lg p-6">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-semibold uppercase tracking-widest text-text-muted mb-2">
                                Routing Success
                            </p>
                            <h3
                                class="text-2xl font-medium text-text-primary"
                                th:text="${#numbers.formatPercent(dashboard.adminData.routingSuccessRate, 1, 1)}"
                            >
                                98%
                            </h3>
                        </div>
                        <div
                            class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-alt text-text-secondary flex-shrink-0"
                        >
                            <i class="fas fa-robot text-lg"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-surface border border-subtle rounded-lg p-6">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-semibold uppercase tracking-widest text-text-muted mb-2">
                                Avg Routing Latency
                            </p>
                            <h3
                                class="text-2xl font-medium text-text-primary"
                            >
                                <th:block th:if="${dashboard.adminData.avgRoutingLatency != null}">
                                    <span th:text="${dashboard.adminData.avgRoutingLatency}">1500</span> ms
                                </th:block>
                                <th:block th:if="${dashboard.adminData.avgRoutingLatency == null}">
                                    N/A
                                </th:block>
                            </h3>
                        </div>
                        <div class="w-12 h-12 flex items-center justify-center rounded-lg bg-surface-alt text-text-secondary flex-shrink-0">
                        <i class="fas fa-tachometer-alt text-lg"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</body>
</html>
