<!doctype html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="~{layouts/common-layout}"
>
<head>
    <title>Dashboard | SupportHub</title>
</head>

<body>
<div layout:fragment="contentBody" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-10">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6">
        <div class="flex items-start gap-4">
            <div class="w-11 h-11 rounded-2xl bg-surface-alt border border-subtle flex items-center justify-center shrink-0">
                <i class="fas fa-gauge-high text-primary"></i>
            </div>
            <div>
                <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight text-text-primary">
                    Welcome back,
                    <span class="text-primary" th:text="${dashboard.user.fullName ?: dashboard.user.username}">User</span>
                </h1>
                <p class="text-text-muted text-sm mt-1">Here’s what’s happening with your tickets today.</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button
                onclick="window.location.reload()"
                class="p-2.5 text-text-muted hover:text-text-primary hover:bg-surface-alt rounded-xl transition-all border border-subtle"
                title="Refresh"
            >
                <i class="fas fa-sync-alt"></i>
            </button>

            <a
                sec:authorize="hasRole('CUSTOMER')"
                th:href="@{/tickets/create/new}"
                class="inline-flex items-center px-5 py-2.5 bg-primary hover:bg-primary-hover text-white text-sm font-semibold rounded-xl shadow-sm transition-all"
            >
                <i class="fas fa-plus mr-2 text-xs"></i>
                New Ticket
            </a>
        </div>
    </div>

    <!-- CUSTOMER -->
    <div
        sec:authorize="hasRole('CUSTOMER')"
        th:if="${dashboard.customerData != null}"
        class="space-y-10"
        id="customer-dashboard-section"
        th:hx-get="@{'/dashboard'}"
        hx-trigger="every 30s"
        hx-select="#customer-dashboard-section"
        hx-swap="outerHTML"
    >
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Open Tickets', value=${dashboard.customerData.openTickets}, icon='folder-open')}"></div>
            <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Waiting on Me', value=${dashboard.customerData.waitingOnMe}, icon='clock')}"></div>
            <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Resolved', value=${dashboard.customerData.resolvedTickets}, icon='check-circle')}"></div>
            <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Closed', value=${dashboard.customerData.closedTickets}, icon='archive')}"></div>
        </div>

        <div th:replace="~{fragments/dashboard-cards :: ticket-list-card(title='Recent Tickets', tickets=${dashboard.customerData.recentTickets}, viewAllUrl='/tickets')}"></div>
    </div>

    <!-- AGENT / SUPERVISOR / ADMIN (agent view) -->
    <div
        sec:authorize="hasAnyRole('AGENT', 'SUPERVISOR', 'ADMIN')"
        th:if="${dashboard.agentData != null}"
        class="space-y-10"
        id="agent-dashboard-section"
        th:hx-get="@{'/dashboard'}"
        hx-trigger="every 30s"
        hx-select="#agent-dashboard-section"
        hx-swap="outerHTML"
    >
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Assigned to Me', value=${dashboard.agentData.myAssignedCount}, icon='user-tag')}"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div th:replace="~{fragments/dashboard-cards :: queue-summary(queueCounts=${dashboard.agentData.queueCounts})}"></div>
            </div>
            <div class="lg:col-span-2">
                <div th:replace="~{fragments/dashboard-cards :: ticket-list-card(title='My Assigned Tickets', tickets=${dashboard.agentData.myTickets}, viewAllUrl='/agent/tickets')}"></div>
            </div>
        </div>
    </div>

    <!-- SUPERVISOR -->
    <div
        sec:authorize="hasAnyRole('SUPERVISOR', 'ADMIN')"
        th:if="${dashboard.supervisorData != null}"
        class="space-y-10"
        id="supervisor-dashboard-section"
        th:hx-get="@{'/dashboard'}"
        hx-trigger="every 30s"
        hx-select="#supervisor-dashboard-section"
        hx-swap="outerHTML"
    >
        <div class="border-t border-subtle pt-10 mt-6 space-y-6">
            <div class="flex items-start gap-4">
                <div class="w-11 h-11 rounded-2xl bg-surface-alt border border-subtle flex items-center justify-center shrink-0">
                    <i class="fas fa-shield-alt text-primary"></i>
                </div>
                <div>
                    <h2 class="text-xl sm:text-2xl font-semibold tracking-tight text-text-primary">
                        Supervisor Overview
                    </h2>
                    <p class="text-sm text-text-muted mt-1">Operational signals and risk hotspots.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Pending Escalations', value=${dashboard.supervisorData.pendingEscalations}, icon='exclamation-triangle')}"></div>
                <div th:replace="~{fragments/dashboard-cards :: stat-card(title='SLA Breaches (24h)', value=${dashboard.supervisorData.slaBreaches}, icon='stopwatch')}"></div>
                <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Human Review Queue', value=${dashboard.supervisorData.humanReviewCount}, icon='user-check')}"></div>
            </div>
        </div>
    </div>

    <!-- ADMIN -->
    <div sec:authorize="hasRole('ADMIN')" th:if="${dashboard.adminData != null}" class="space-y-10">
        <div class="border-t border-subtle pt-10 mt-6 space-y-6">
            <div class="flex items-start gap-4">
                <div class="w-11 h-11 rounded-2xl bg-surface-alt border border-subtle flex items-center justify-center shrink-0">
                    <i class="fas fa-cogs text-primary"></i>
                </div>
                <div>
                    <h2 class="text-xl sm:text-2xl font-semibold tracking-tight text-text-primary">
                        System Administration
                    </h2>
                    <p class="text-sm text-text-muted mt-1">System-level metrics and routing health.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Total Users', value=${dashboard.adminData.totalUsers}, icon='users')}"></div>
                <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Total Tickets', value=${dashboard.adminData.totalTickets}, icon='ticket-alt')}"></div>
                <div th:replace="~{fragments/dashboard-cards :: stat-card(title='Routing Success', value=${#numbers.formatPercent(dashboard.adminData.routingSuccessRate, 1, 1)}, icon='robot')}"></div>

                <!-- Avg Routing Latency needs conditional output, so keep custom card but match style -->
                <div class="bg-surface border border-subtle rounded-2xl p-6 shadow-sm">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-semibold uppercase tracking-widest text-text-muted mb-2">
                                Avg Routing Latency
                            </p>
                            <h3 class="text-2xl font-semibold text-text-primary">
                                <th:block th:if="${dashboard.adminData.avgRoutingLatency != null}">
                                    <span th:text="${dashboard.adminData.avgRoutingLatency}">1500</span> ms
                                </th:block>
                                <th:block th:if="${dashboard.adminData.avgRoutingLatency == null}">
                                    N/A
                                </th:block>
                            </h3>
                        </div>
                        <div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-surface-alt border border-subtle text-text-secondary flex-shrink-0">
                            <i class="fas fa-tachometer-alt text-lg"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
