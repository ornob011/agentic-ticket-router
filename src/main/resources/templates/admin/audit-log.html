<!doctype html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/common-layout}"
>
    <head>
        <title>Audit Log | SupportHub</title>
    </head>

    <body>
        <div layout:fragment="contentBody" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <div th:replace="~{fragments/flash-message :: flash-message-block}" th:remove="tag"></div>

            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">
                    <i class="fas fa-history text-gray-500 mr-3"></i>
                    Audit Log
                </h1>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
                <form th:action="@{/admin/audit-log}" method="get" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Ticket ID</label>
                            <input
                                type="text"
                                name="ticketId"
                                placeholder="Enter ticket ID"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Event Type</label>
                            <select
                                name="eventType"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            >
                                <option value="">All Events</option>
                                <option
                                    th:each="type : ${T(com.dsi.support.agenticrouter.enums.AuditEventType).values()}"
                                    th:value="${type}"
                                    th:text="${type.description}"
                                >
                                    Event
                                </option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">User ID</label>
                            <input
                                type="text"
                                name="performedById"
                                placeholder="Enter user ID"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            />
                        </div>
                        <div class="flex items-end gap-2">
                            <div class="flex-1">
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Start Date</label>
                                <input
                                    type="datetime-local"
                                    name="startDate"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                />
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-semibold text-gray-700 mb-1">End Date</label>
                                <input
                                    type="datetime-local"
                                    name="endDate"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                />
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-end gap-2">
                        <button
                            type="reset"
                            class="px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors"
                        >
                            <i class="fas fa-undo mr-2"></i>
                            Reset
                        </button>
                        <button
                            type="submit"
                            class="px-6 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-sm transition-all"
                        >
                            <i class="fas fa-search mr-2"></i>
                            Search
                        </button>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Timestamp
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Event Type
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Description
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                User
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Ticket
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                IP Address
                            </th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr class="hover:bg-gray-50 transition-colors duration-200">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                                <span th:text="${#temporals.format(event.createdAt, 'yyyy-MM-dd HH:mm:ss')}"
                                    >2024-01-15 10:30:45</span
                                >
                                <div
                                    th:if="${event.correlationId}"
                                    class="text-xs text-gray-400 mt-1"
                                    th:text="'CID: ' + ${event.correlationId}"
                                >
                                    Correlation ID
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span
                                    class="text-sm font-medium"
                                    th:class="${event.error} ? 'text-red-800 bg-red-100' : 'text-gray-900 bg-gray-100'}"
                                    th:text="${event.eventType.description}"
                                    >Event Type</span
                                >
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-sm text-gray-900" th:text="${event.description}"
                                    >Event description</span
                                >
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span
                                    class="text-sm text-gray-600"
                                    th:text="${event.performedBy != null ? event.performedBy.username : 'SYSTEM'}"
                                    >User</span
                                >
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <a
                                    th:if="${event.ticket != null}"
                                    th:href="@{/agent/tickets/{id}(id=${event.ticket.id})}"
                                    class="text-sm font-medium text-blue-600 hover:text-blue-700"
                                >
                                    <span th:text="${event.ticket.formattedTicketNo}">TKT-00000001</span>
                                </a>
                                <span th:if="${event.ticket == null}" class="text-sm text-gray-400">N/A</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="text-sm text-gray-600" th:text="${event.ipAddress ?: 'N/A'}"
                                    >192.168.1.1</span
                                >
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="p-12 text-center">
                    <i class="fas fa-filter text-5xl text-gray-200 mb-4"></i>
                    <p class="text-gray-600 text-lg">Use the filters above to search the audit log</p>
                </div>
            </div>
        </div>
    </body>
</html>
