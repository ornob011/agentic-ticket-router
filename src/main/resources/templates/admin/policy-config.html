<!doctype html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/common-layout}"
>
    <head>
        <title>Policy Configuration | SupportHub</title>
    </head>

    <body>
        <div layout:fragment="contentBody" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <div th:replace="~{fragments/flash-message :: flash-message-block}" th:remove="tag"></div>

            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">
                    <i class="fas fa-sliders-h text-blue-500 mr-3"></i>
                    Policy Configuration
                </h1>
            </div>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <div class="divide-y divide-gray-200">
                    <th:block th:each="policy : ${policies}">
                        <div class="p-6 hover:bg-gray-50 transition-colors duration-200">
                            <form th:action="@{/admin/policy-config}" method="post" class="space-y-4">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-3 mb-2">
                                            <h3 class="text-lg font-bold text-gray-900" th:text="${policy.configKey}">
                                                CONFIG_KEY
                                            </h3>
                                            <div
                                                class="px-2 py-1 text-xs font-bold rounded-full bg-blue-100 text-blue-800"
                                                th:text="${policy.configKey.name()}"
                                            >
                                                Type
                                            </div>
                                        </div>
                                        <p class="text-gray-600 text-sm" th:text="${policy.description}">
                                            Policy description
                                        </p>
                                    </div>
                                    <div
                                        th:if="${policy.minValue != null or policy.maxValue != null}"
                                        class="ml-4 text-xs text-gray-500"
                                    >
                                        <span th:if="${policy.minValue != null}"
                                            >Min: <span th:text="${policy.minValue}">0.00</span></span
                                        >
                                        <span th:if="${policy.minValue != null and policy.maxValue != null}"> | </span>
                                        <span th:if="${policy.maxValue != null}"
                                            >Max: <span th:text="${policy.maxValue}">1.00</span></span
                                        >
                                    </div>
                                </div>

                                <div class="flex items-end gap-4">
                                    <div class="flex-1">
                                        <label class="block text-sm font-semibold text-gray-700 mb-1"
                                            >Current Value</label
                                        >
                                        <input
                                            type="number"
                                            step="0.01"
                                            th:attr="min=${policy.minValue}, max=${policy.maxValue}"
                                            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-gray-900 font-medium"
                                            th:name="configValue"
                                            th:value="${policy.configValue}"
                                        />
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-gray-700 mb-1">Policy Key</label>
                                        <input type="hidden" th:name="configKey" th:value="${policy.configKey}" />
                                        <span
                                            class="px-3 py-2.5 text-sm text-gray-600 bg-gray-100 rounded-xl"
                                            th:text="${policy.configKey}"
                                            >KEY</span
                                        >
                                    </div>
                                    <button
                                        type="submit"
                                        class="px-6 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-sm transition-all"
                                    >
                                        <i class="fas fa-save mr-2"></i>
                                        Save
                                    </button>
                                </div>
                            </form>
                        </div>
                    </th:block>
                </div>

                <div th:if="${policies == null or policies.empty}" class="p-12 text-center">
                    <i class="fas fa-sliders-h text-5xl text-gray-200 mb-4"></i>
                    <p class="text-gray-600 text-lg">No policies configured</p>
                    <p class="text-gray-500 text-sm mt-2">Policies need to be seeded in the database.</p>
                </div>
            </div>
        </div>
    </body>
</html>
