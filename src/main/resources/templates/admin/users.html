<!doctype html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/common-layout}"
>
    <head>
        <title>User Management | SupportHub</title>
    </head>

    <body>
        <div layout:fragment="contentBody" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <div th:replace="~{fragments/flash-message :: flash-message-block}" th:remove="tag"></div>

            <div class="mb-6 flex items-center justify-between">
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">
                    <i class="fas fa-users text-cyan-500 mr-3"></i>
                    User Management
                </h1>
                <button
                    type="button"
                    onclick="document.getElementById('create-staff-modal').classList.remove('hidden')"
                    class="px-4 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-sm transition-all"
                >
                    <i class="fas fa-plus mr-2"></i>
                    Create Staff User
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Username
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Email
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Name
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Role
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Status
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Last Login
                            </th>
                            <th class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">
                                Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <th:block th:each="user : ${users}">
                            <tr class="hover:bg-gray-50 transition-colors duration-200">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="text-sm font-medium text-gray-900" th:text="${user.username}"
                                        >username</span
                                    >
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="text-sm text-gray-600" th:text="${user.email}">email@example.com</span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="text-sm text-gray-900" th:text="${user.fullName ?: 'N/A'}"
                                        >Full Name</span
                                    >
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span
                                        class="text-sm font-medium"
                                        th:class="${user.role.name() == 'ADMIN' ? 'text-purple-800 bg-purple-100' : user.role.name() == 'SUPERVISOR' ? 'text-amber-800 bg-amber-100' : user.role.name() == 'AGENT' ? 'text-blue-800 bg-blue-100' : 'text-gray-800 bg-gray-100'}"
                                        th:text="${user.role}"
                                        >ROLE</span
                                    >
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span
                                        th:if="${user.active}"
                                        class="inline-flex items-center px-2 py-1 text-xs font-bold rounded-full bg-green-100 text-green-800"
                                    >
                                        <i class="fas fa-check-circle mr-1"></i>
                                        Active
                                    </span>
                                    <span
                                        th:if="${not user.active}"
                                        class="inline-flex items-center px-2 py-1 text-xs font-bold rounded-full bg-red-100 text-red-800"
                                    >
                                        <i class="fas fa-times-circle mr-1"></i>
                                        Inactive
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span
                                        class="text-sm text-gray-600"
                                        th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt, 'yyyy-MM-dd HH:mm') : 'Never'}"
                                        >2024-01-15 10:30</span
                                    >
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right">
                                    <div class="flex items-center justify-end gap-2">
                                        <button
                                            type="button"
                                            th:attr="data-user-id=${user.id}"
                                            class="px-3 py-1.5 text-xs font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors js-toggle-active"
                                        >
                                            <i th:if="${user.active}" class="fas fa-ban mr-1"></i>
                                            <i th:if="${not user.active}" class="fas fa-check mr-1"></i>
                                            <span th:text="${user.active ? 'Disable' : 'Enable'}">Action</span>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>

                <div th:if="${users == null or users.empty}" class="p-12 text-center">
                    <i class="fas fa-users text-5xl text-gray-200 mb-4"></i>
                    <p class="text-gray-600 text-lg">No users found</p>
                </div>
            </div>

            <div
                id="create-staff-modal"
                class="hidden fixed inset-0 z-50 overflow-y-auto"
                aria-labelledby="modal-title"
            >
                <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                    <div
                        class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"
                        onclick="document.getElementById('create-staff-modal').classList.add('hidden')"
                    ></div>
                    <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
                    <div
                        class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full"
                    >
                        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                            <div class="sm:flex sm:items-start">
                                <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                                    <h3 class="text-lg font-bold text-gray-900 mb-4" id="modal-title">
                                        Create Staff User
                                    </h3>
                                    <form th:action="@{/admin/users/create-staff}" method="post" class="space-y-4">
                                        <div>
                                            <label class="block text-sm font-semibold text-gray-700 mb-1"
                                                >Username</label
                                            >
                                            <input
                                                type="text"
                                                name="username"
                                                required
                                                maxlength="50"
                                                class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            />
                                        </div>
                                        <div>
                                            <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                                            <input
                                                type="email"
                                                name="email"
                                                required
                                                maxlength="100"
                                                class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            />
                                        </div>
                                        <div>
                                            <label class="block text-sm font-semibold text-gray-700 mb-1"
                                                >Full Name</label
                                            >
                                            <input
                                                type="text"
                                                name="fullName"
                                                required
                                                maxlength="100"
                                                class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            />
                                        </div>
                                        <div>
                                            <label class="block text-sm font-semibold text-gray-700 mb-1">Role</label>
                                            <select
                                                name="role"
                                                required
                                                class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            >
                                                <option value="">Select Role</option>
                                                <option
                                                    th:each="role : ${availableRoles}"
                                                    th:if="${role.name() != 'CUSTOMER'}"
                                                    th:value="${role}"
                                                    th:text="${role}"
                                                >
                                                    ROLE
                                                </option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-sm font-semibold text-gray-700 mb-1"
                                                >Password</label
                                            >
                                            <input
                                                type="password"
                                                name="password"
                                                required
                                                minlength="8"
                                                maxlength="128"
                                                class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            />
                                        </div>
                                        <div class="mt-6 sm:mt-4 sm:flex sm:flex-row-reverse sm:gap-2">
                                            <button
                                                type="submit"
                                                class="w-full inline-flex justify-center rounded-xl px-4 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 shadow-sm sm:w-auto sm:text-base"
                                            >
                                                Create User
                                            </button>
                                            <button
                                                type="button"
                                                onclick="
                                                    document
                                                        .getElementById('create-staff-modal')
                                                        .classList.add('hidden')
                                                "
                                                class="mt-3 w-full inline-flex justify-center rounded-xl px-4 py-2.5 text-sm font-semibold text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 shadow-sm sm:mt-0 sm:w-auto sm:text-base"
                                            >
                                                Cancel
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div layout:fragment="scripts">
            <script th:inline="javascript">
                document.querySelectorAll(".js-toggle-active").forEach((btn) => {
                    btn.addEventListener("click", function () {
                        const userId = this.getAttribute("data-user-id");

                        if (confirm("Are you sure you want to toggle this user's active status?")) {
                            const form = document.createElement("form");
                            form.method = "POST";
                            form.action = "/admin/users/" + userId + "/toggle-active";

                            document.body.appendChild(form);
                            form.submit();
                        }
                    });
                });
            </script>
        </div>
    </body>
</html>
