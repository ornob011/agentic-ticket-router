<!doctype html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/common-layout}"
>
    <head>
        <title>Model Registry | SupportHub</title>
    </head>

    <body>
        <div layout:fragment="contentBody" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <div th:replace="~{fragments/flash-message :: flash-message-block}" th:remove="tag"></div>

            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">
                    <i class="fas fa-robot text-purple-500 mr-3"></i>
                    Model Registry
                </h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <th:block th:each="model : ${models}">
                    <div
                        class="bg-white rounded-2xl shadow-sm border-2 transition-all duration-300"
                        th:classappend="${model.active} ? 'border-green-500' : 'border-gray-200 hover:border-gray-300'"
                    >
                        <div class="p-6">
                            <div class="flex items-start justify-between mb-4">
                                <div class="flex-1 min-w-0">
                                    <h3 class="text-lg font-bold text-gray-900 mb-1" th:text="${model.modelTag}">
                                        Model Tag
                                    </h3>
                                    <div
                                        th:if="${model.active}"
                                        class="inline-flex items-center px-2 py-1 text-xs font-bold rounded-full bg-green-100 text-green-800"
                                    >
                                        <i class="fas fa-check-circle mr-1"></i>
                                        Active
                                    </div>
                                    <div
                                        th:if="${not model.active}"
                                        class="inline-flex items-center px-2 py-1 text-xs font-bold rounded-full bg-gray-100 text-gray-800"
                                    >
                                        Inactive
                                    </div>
                                </div>
                                <div th:if="${model.baseModel}" class="text-xs text-gray-500 uppercase tracking-wide">
                                    <span th:text="${model.baseModel}">Base Model</span>
                                </div>
                            </div>

                            <p class="text-gray-600 text-sm mb-4" th:text="${model.description ?: 'No description'}">
                                Model description
                            </p>

                            <div class="space-y-2 mb-4">
                                <div th:if="${model.version}">
                                    <span class="text-xs text-gray-500 font-medium">Version:</span>
                                    <span class="text-sm text-gray-900 ml-2" th:text="${model.version}">1.0.0</span>
                                </div>
                                <div th:if="${model.activatedBy}">
                                    <span class="text-xs text-gray-500 font-medium">Activated By:</span>
                                    <span class="text-sm text-gray-900 ml-2" th:text="${model.activatedBy.fullName}"
                                        >Admin</span
                                    >
                                </div>
                                <div th:if="${model.activatedAt}">
                                    <span class="text-xs text-gray-500 font-medium">Activated At:</span>
                                    <span
                                        class="text-sm text-gray-900 ml-2"
                                        th:text="${#temporals.format(model.activatedAt, 'yyyy-MM-dd HH:mm')}"
                                        >2024-01-15 10:30</span
                                    >
                                </div>
                            </div>

                            <th:block th:if="${not model.active}">
                                <form th:action="@{/admin/model-registry/activate}" method="post" class="inline-block">
                                    <input type="hidden" name="modelTag" th:value="${model.modelTag}" />
                                    <button
                                        type="submit"
                                        class="w-full px-4 py-2.5 text-sm font-semibold text-white bg-purple-600 hover:bg-purple-700 rounded-xl shadow-sm transition-all"
                                    >
                                        <i class="fas fa-power-off mr-2"></i>
                                        Activate Model
                                    </button>
                                </form>
                            </th:block>
                            <th:block th:if="${model.active}">
                                <button
                                    disabled
                                    class="w-full px-4 py-2.5 text-sm font-semibold text-gray-400 bg-gray-100 rounded-xl cursor-not-allowed"
                                >
                                    <i class="fas fa-check mr-2"></i>
                                    Currently Active
                                </button>
                            </th:block>
                        </div>
                    </div>
                </th:block>
            </div>

            <div th:if="${models == null or models.empty}" class="text-center py-12">
                <i class="fas fa-robot text-5xl text-gray-200 mb-4"></i>
                <p class="text-gray-600 text-lg">No models registered</p>
                <p class="text-gray-500 text-sm mt-2">
                    Models need to be registered in the database before they can be activated.
                </p>
            </div>
        </div>
    </body>
</html>
