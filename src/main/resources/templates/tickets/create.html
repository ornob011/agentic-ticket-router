<!doctype html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/common-layout}"
>
    <head>
        <title>Create Support Ticket | SupportHub</title>
    </head>
    <body>
        <div
            layout:fragment="contentBody"
            class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 px-4 sm:px-6 lg:px-8 py-12"
        >
            <div class="max-w-2xl mx-auto">
                <div th:replace="~{fragments/flash-message :: flash-message-block}" th:remove="tag"></div>

                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-semibold text-gray-900 mb-2">Create Support Ticket</h1>
                    <p class="text-gray-600">Describe your issue and we'll get back to you shortly.</p>
                </div>

                <!-- Form Card -->
                <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
                    <form th:object="${createTicketDto}" method="post" class="space-y-6">
                        <!-- Subject Field -->
                        <div
                            th:replace="~{fragments/form-fields :: input(
                                field='subject',
                                label='Subject',
                                placeholder='Brief description of your issue'
                            )}"
                        ></div>

                        <!-- Content Field -->
                        <div
                            th:replace="~{fragments/form-fields :: textarea(
                                field='content',
                                label='Message',
                                placeholder='Please describe your issue in detail...',
                                rows='10'
                            )}"
                        ></div>

                        <div class="flex items-start gap-2 px-4 py-3 bg-blue-50 rounded-lg">
                            <i class="fas fa-info-circle text-blue-500 mt-0.5 text-sm"></i>
                            <span class="text-sm text-gray-600">Minimum 10 characters, maximum 10,000 characters</span>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex flex-col sm:flex-row gap-3 pt-2">
                            <button
                                type="submit"
                                class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow-md hover:shadow-lg transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                            >
                                <i class="fas fa-paper-plane text-sm"></i>
                                <span>Create Ticket</span>
                            </button>
                            <a
                                th:href="@{/tickets}"
                                class="inline-flex items-center justify-center px-6 py-3 bg-white hover:bg-gray-50 text-gray-700 font-medium rounded-lg border border-gray-300 transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2"
                            >
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
