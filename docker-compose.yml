services:
  agentic_ticketing_postgres:
    image: pgvector/pgvector:pg16
    container_name: dsi_agentic_ticketing_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: dsi_agentic_ticketing
      POSTGRES_USER: agentic_ticketing_app
      POSTGRES_PASSWORD: dev_strong_password_change_later
      TZ: Asia/Dhaka
      PGTZ: Asia/Dhaka

    ports:
      - "5432:5432"

    volumes:
      - dsi_agentic_ticketing_pgdata:/var/lib/postgresql/data

    shm_size: "256mb"
    stop_grace_period: 60s

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 3s
      retries: 12

    command:
      - postgres
      - -c
      - timezone=Asia/Dhaka
      - -c
      - log_timezone=Asia/Dhaka
      - -c
      - max_connections=200
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - log_min_duration_statement=250
      - -c
      - log_statement=none

volumes:
  dsi_agentic_ticketing_pgdata:
    name: dsi_agentic_ticketing_pgdata
